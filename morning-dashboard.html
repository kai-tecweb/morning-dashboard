<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>朝の整理ダッシュボード ・ 和牛屋ふくだ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ===== 朝の整理ダッシュボード — 食肉卸 EC ===== */

:root {
  --bg: #F7F1E3;
  --bg-2: #FBF6E9;
  --surface: #FFFFFF;
  --surface-2: #FDFAF1;
  --ink: #2A251D;
  --ink-2: #5C544A;
  --ink-3: #948A7C;
  --line: #E8DEC9;
  --line-2: #F0E8D6;

  --terracotta: #C66F4D;
  --terracotta-soft: #F5D9CB;
  --terracotta-ink: #8A4628;

  --sage: #7E9A75;
  --sage-soft: #DCE6D2;
  --sage-ink: #4D6A48;

  --amber: #D4A24C;
  --amber-soft: #F5E3BD;
  --amber-ink: #8C6420;

  --rose: #C75C5C;
  --rose-soft: #F4D2D2;
  --rose-ink: #8A2E2E;

  --plum: #8A6CA3;
  --plum-soft: #E4D8EF;

  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 22px;
  --radius-xl: 28px;

  --shadow-sm: 0 1px 0 rgba(82,68,40,.04), 0 1px 2px rgba(82,68,40,.05);
  --shadow: 0 1px 0 rgba(82,68,40,.04), 0 6px 18px -8px rgba(82,68,40,.18);
  --shadow-lg: 0 2px 0 rgba(82,68,40,.04), 0 18px 40px -16px rgba(82,68,40,.25);

  --font-display: "Zen Maru Gothic", "Hiragino Maru Gothic ProN", system-ui, sans-serif;
  --font-body: "Zen Kaku Gothic New", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "palt";
}

button {
  font-family: inherit;
  cursor: pointer;
  border: 0;
  background: none;
  color: inherit;
  padding: 0;
}

input, textarea {
  font-family: inherit;
  color: inherit;
}

h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 600;
  margin: 0;
  letter-spacing: .01em;
}

/* ===== App shell ===== */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(247, 241, 227, 0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
}

.topbar-inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 14px 28px 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.topbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-mark {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--terracotta), #B85A38);
  display: grid;
  place-items: center;
  color: #fff;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  box-shadow: 0 6px 14px -6px rgba(186, 91, 56, .55);
}
.brand-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
  line-height: 1.1;
}
.brand-sub {
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: .04em;
}

.greeting {
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.greeting-hello {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 18px;
}
.greeting-date {
  color: var(--ink-3);
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}

.topnav {
  display: flex;
  gap: 4px;
  align-items: flex-end;
}
.tab {
  position: relative;
  padding: 10px 18px 14px;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 14px;
  color: var(--ink-2);
  border-radius: 12px 12px 0 0;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: color .15s;
}
.tab:hover { color: var(--ink); }
.tab.active {
  color: var(--terracotta-ink);
  font-weight: 600;
}
.tab.active::after {
  content: "";
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: -1px;
  height: 3px;
  background: var(--terracotta);
  border-radius: 3px 3px 0 0;
}
.tab-count {
  display: inline-grid;
  place-items: center;
  min-width: 22px;
  height: 20px;
  padding: 0 6px;
  border-radius: 999px;
  background: var(--line);
  color: var(--ink-2);
  font-size: 11px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.tab.active .tab-count {
  background: var(--terracotta);
  color: #fff;
}
.tab-count.urgent {
  background: var(--rose);
  color: #fff;
}

.user-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px 6px 6px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 999px;
}
.user-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--sage-soft);
  color: var(--sage-ink);
  display: grid;
  place-items: center;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
}
.user-chip-name { font-size: 13px; font-weight: 500; }
.user-chip-role { font-size: 11px; color: var(--ink-3); }

/* ===== Main ===== */
.main {
  flex: 1;
  max-width: 1320px;
  width: 100%;
  margin: 0 auto;
  padding: 28px;
}

/* ===== Cards ===== */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}

.card-pad { padding: 22px; }

.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
}
.section-sub {
  font-size: 12px;
  color: var(--ink-3);
}

/* ===== Badges / chips ===== */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 22px;
  padding: 0 9px;
  border-radius: 999px;
  background: var(--line-2);
  color: var(--ink-2);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .02em;
  white-space: nowrap;
}
.chip-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.chip-rose { background: var(--rose-soft); color: var(--rose-ink); }
.chip-amber { background: var(--amber-soft); color: var(--amber-ink); }
.chip-sage { background: var(--sage-soft); color: var(--sage-ink); }
.chip-terra { background: var(--terracotta-soft); color: var(--terracotta-ink); }
.chip-plum { background: var(--plum-soft); color: #5d4378; }
.chip-line {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink-2);
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 36px;
  padding: 0 16px;
  border-radius: 999px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 13px;
  transition: transform .08s, background .15s, border-color .15s;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--terracotta);
  color: #fff;
}
.btn-primary:hover { background: var(--terracotta-ink); }
.btn-ghost {
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--ink-2);
}
.btn-ghost:hover { border-color: var(--ink-3); color: var(--ink); }
.btn-sm { height: 28px; padding: 0 12px; font-size: 12px; }
.btn-icon {
  width: 32px; height: 32px; padding: 0;
  display: grid; place-items: center;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--ink-2);
}
.btn-icon:hover { background: var(--bg-2); color: var(--ink); }

/* ===== Summary view ===== */
.summary-hero {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #FFF6E4 0%, #FAEAD0 100%);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  padding: 28px 32px;
  margin-bottom: 24px;
}
.summary-hero::after {
  content: "";
  position: absolute;
  right: -60px; top: -60px;
  width: 240px; height: 240px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #FFE3A3, transparent 70%);
  pointer-events: none;
}
.summary-hero-grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 28px;
  align-items: center;
}
.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  background: rgba(255,255,255,.7);
  border: 1px solid #E8D8B5;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  color: var(--amber-ink);
  letter-spacing: .06em;
  margin-bottom: 12px;
}
.hero-eyebrow-pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 0 0 rgba(212,162,76,.6);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(212,162,76,.6); }
  70% { box-shadow: 0 0 0 8px rgba(212,162,76,0); }
  100% { box-shadow: 0 0 0 0 rgba(212,162,76,0); }
}
.hero-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 28px;
  line-height: 1.35;
  margin: 0 0 8px;
  letter-spacing: 0;
}
.hero-title em { font-style: normal; color: var(--terracotta-ink); }
.hero-desc {
  color: var(--ink-2);
  font-size: 14px;
  line-height: 1.7;
  margin: 0;
  max-width: 48ch;
}
.hero-stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.hero-stat {
  background: rgba(255,255,255,.75);
  border: 1px solid rgba(232,222,201,.7);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.hero-stat-label {
  font-size: 11px;
  color: var(--ink-3);
  margin-bottom: 4px;
}
.hero-stat-num {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 26px;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.hero-stat-unit {
  font-size: 12px;
  color: var(--ink-2);
  margin-left: 3px;
}
.hero-stat-foot {
  font-size: 11px;
  color: var(--ink-3);
  margin-top: 4px;
}
.hero-stat.urgent .hero-stat-num { color: var(--rose-ink); }

/* Priority list */
.priority-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 1024px) {
  .priority-grid { grid-template-columns: 1fr; }
  .summary-hero-grid { grid-template-columns: 1fr; }
}

.prio-item {
  display: flex;
  gap: 12px;
  padding: 14px 0;
  border-top: 1px dashed var(--line);
  align-items: flex-start;
}
.prio-item:first-child { border-top: 0; padding-top: 4px; }
.prio-rank {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  background: var(--line-2);
  color: var(--ink-2);
}
.prio-rank.r1 { background: var(--rose); color: #fff; }
.prio-rank.r2 { background: var(--terracotta); color: #fff; }
.prio-rank.r3 { background: var(--amber); color: #fff; }
.prio-body { flex: 1; min-width: 0; }
.prio-title {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.prio-id {
  font-size: 11px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.prio-reason {
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.55;
}
.prio-reason strong { color: var(--rose-ink); font-weight: 600; }
.prio-action {
  align-self: center;
}

/* ===== Order board (kanban) ===== */
.board {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 14px;
  align-items: flex-start;
}
@media (max-width: 1200px) {
  .board { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}
@media (max-width: 768px) {
  .board { grid-template-columns: 1fr; }
  .main { padding: 16px; }
  .topbar-inner { padding: 12px 16px 0; }
}

.col {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 320px;
}
.col-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px 4px 4px;
}
.col-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 13px;
  color: var(--ink);
}
.col-icon {
  width: 22px; height: 22px;
  border-radius: 7px;
  display: grid; place-items: center;
  color: #fff;
  font-size: 12px;
}
.col-icon.s1 { background: var(--plum); }
.col-icon.s2 { background: var(--terracotta); }
.col-icon.s3 { background: var(--amber); }
.col-icon.s4 { background: var(--sage); }
.col-icon.s5 { background: #6e8aa8; }

.col-count {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}

.ord-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: transform .12s, box-shadow .12s, border-color .12s;
  cursor: pointer;
  position: relative;
}
.ord-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow);
  border-color: #DBC9A4;
}
.ord-card.urgent { border-left: 3px solid var(--rose); }
.ord-card.warn { border-left: 3px solid var(--amber); }

.ord-card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
}
.ord-id {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 12px;
  color: var(--ink-2);
  font-variant-numeric: tabular-nums;
}
.ord-time {
  font-size: 11px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.ord-customer {
  font-weight: 600;
  font-size: 13px;
  color: var(--ink);
}
.ord-items {
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.ord-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  margin-top: 2px;
}
.ord-yen {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}
.ord-flags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.ord-quick {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}
.ord-quick button {
  flex: 1;
  height: 26px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-display);
  background: var(--bg-2);
  color: var(--ink-2);
  border: 1px solid transparent;
  transition: all .15s;
}
.ord-quick button:hover {
  background: var(--terracotta-soft);
  color: var(--terracotta-ink);
}
.ord-quick button.back:hover {
  background: var(--line);
  color: var(--ink-2);
}

/* ===== Inquiries ===== */
.inquiries-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 20px;
}
@media (max-width: 900px) {
  .inquiries-layout { grid-template-columns: 1fr; }
}

.filter-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.filter-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 12px;
  border-radius: 10px;
  font-size: 13px;
  color: var(--ink-2);
  cursor: pointer;
  transition: background .12s;
  width: 100%;
  text-align: left;
}
.filter-item:hover { background: var(--bg-2); }
.filter-item.active {
  background: var(--terracotta-soft);
  color: var(--terracotta-ink);
  font-weight: 600;
}
.filter-item-count {
  font-size: 11px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.filter-item.active .filter-item-count { color: var(--terracotta-ink); }

.inq-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.inq-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 18px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  align-items: flex-start;
  transition: box-shadow .12s, border-color .12s;
}
.inq-card:hover { box-shadow: var(--shadow); border-color: #DBC9A4; }
.inq-card.done { opacity: .58; }
.inq-card.done .inq-subject { text-decoration: line-through; }

.anger {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 10px;
  border-radius: 12px;
  min-width: 56px;
}
.anger-face {
  font-size: 22px;
  line-height: 1;
}
.anger-label {
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font-display);
}
.anger.lv3 { background: var(--rose-soft); color: var(--rose-ink); }
.anger.lv2 { background: var(--amber-soft); color: var(--amber-ink); }
.anger.lv1 { background: var(--sage-soft); color: var(--sage-ink); }

.inq-body { min-width: 0; }
.inq-head {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}
.inq-customer {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
}
.inq-meta {
  font-size: 11px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.inq-subject {
  font-size: 13px;
  color: var(--ink);
  font-weight: 500;
  margin: 2px 0 6px;
}
.inq-preview {
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
}
.inq-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.inq-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 110px;
}

/* ===== Tasks ===== */
.tasks-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}
@media (max-width: 900px) {
  .tasks-grid { grid-template-columns: 1fr; }
}

.task-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.task-group-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 4px 6px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 13px;
  color: var(--ink-2);
}
.task-group-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

.task-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 12px;
  border-radius: 12px;
  transition: background .12s;
  cursor: pointer;
}
.task-row:hover { background: var(--bg-2); }
.task-check {
  width: 22px; height: 22px;
  border-radius: 8px;
  border: 1.5px solid var(--line);
  background: var(--surface);
  flex-shrink: 0;
  display: grid;
  place-items: center;
  margin-top: 1px;
  transition: all .15s;
}
.task-check svg { opacity: 0; transition: opacity .15s; }
.task-row.done .task-check {
  background: var(--sage);
  border-color: var(--sage);
}
.task-row.done .task-check svg { opacity: 1; }
.task-body { flex: 1; min-width: 0; }
.task-title {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.5;
  margin-bottom: 4px;
}
.task-row.done .task-title { text-decoration: line-through; color: var(--ink-3); }
.task-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 11px;
  color: var(--ink-3);
  flex-wrap: wrap;
}
.task-due {
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}
.task-due.late { color: var(--rose-ink); }

/* Progress ring */
.ring-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px;
  background: linear-gradient(135deg, #F4EAD3, #FBF6E9);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}
.ring-svg {
  width: 84px;
  height: 84px;
  flex-shrink: 0;
}
.ring-text {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  fill: var(--ink);
}
.ring-sub-text {
  font-size: 10px;
  fill: var(--ink-3);
}

/* Detail drawer */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(42,37,29,.32);
  backdrop-filter: blur(4px);
  z-index: 40;
  animation: fadeIn .18s ease-out;
}
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
.drawer {
  position: fixed;
  top: 0; right: 0;
  width: min(520px, 100vw);
  height: 100vh;
  background: var(--surface);
  z-index: 41;
  box-shadow: -20px 0 60px -20px rgba(42,37,29,.25);
  display: flex;
  flex-direction: column;
  animation: slideIn .24s cubic-bezier(.2,.8,.2,1);
}
@keyframes slideIn { from { transform: translateX(20px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }

.drawer-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
}
.drawer-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--line);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.kv-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 22px; }
.kv-row { display: grid; grid-template-columns: 96px 1fr; gap: 12px; font-size: 13px; }
.kv-key { color: var(--ink-3); font-size: 12px; }
.kv-val { color: var(--ink); }

.timeline {
  position: relative;
  padding-left: 24px;
  margin-bottom: 22px;
}
.timeline::before {
  content: "";
  position: absolute;
  left: 8px; top: 6px; bottom: 6px;
  width: 2px;
  background: var(--line);
}
.tl-step {
  position: relative;
  padding-bottom: 14px;
}
.tl-step:last-child { padding-bottom: 0; }
.tl-dot {
  position: absolute;
  left: -22px; top: 3px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--surface);
  border: 2px solid var(--line);
}
.tl-step.done .tl-dot { background: var(--sage); border-color: var(--sage); }
.tl-step.current .tl-dot { background: var(--terracotta); border-color: var(--terracotta); box-shadow: 0 0 0 4px var(--terracotta-soft); }
.tl-label { font-size: 13px; font-weight: 600; }
.tl-time { font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums; }

.note-list { display: flex; flex-direction: column; gap: 8px; }
.note-item {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--ink-2);
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.note-icon {
  flex-shrink: 0; width: 18px; height: 18px;
  border-radius: 6px;
  background: var(--amber-soft);
  color: var(--amber-ink);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: #FAF1DE;
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-family: var(--font-display);
  font-weight: 500;
  z-index: 50;
  box-shadow: var(--shadow-lg);
  animation: toastIn .25s cubic-bezier(.2,.8,.2,1);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
@keyframes toastIn {
  from { transform: translate(-50%, 8px); opacity: 0 }
  to { transform: translate(-50%, 0); opacity: 1 }
}

/* Small touches */
.dots {
  display: inline-flex;
  gap: 3px;
}
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--line); }
.dot.on { background: var(--terracotta); }

.kbd {
  font-family: var(--font-body);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 5px;
  background: var(--line-2);
  color: var(--ink-2);
  border: 1px solid var(--line);
}

/* hidden util */
.sr { position: absolute; left: -9999px; }
</style>
</head>

        <path {...stroke} d="M5 4h4l2 5-2.5 1.5a11 11 0 005 5L15 13l5 2v4a2 2 0 01-2 2A15 15 0 013 6a2 2 0 012-2z"/>
      </svg>
    );
    case "clock": return (
      <svg width={s} height={s} viewBox="0 0 24 24" className={className}>
        <circle cx="12" cy="12" r="9" {...stroke}/>
        <path {...stroke} d="M12 7v5l3 2"/>
      </svg>
    );
    case "alert": return (
      <svg width={s} height={s} viewBox="0 0 24 24" className={className}>
        <path {...stroke} d="M12 3l10 17H2L12 3zM12 10v4M12 17h.01"/>
      </svg>
    );
    case "help": return (
      <svg width={s} height={s} viewBox="0 0 24 24" className={className}>
        <circle cx="12" cy="12" r="9" {...stroke}/>
        <path {...stroke} d="M9.5 9a2.5 2.5 0 015 .5c0 1.5-2.5 2-2.5 3.5M12 17h.01"/>
      </svg>
    );
    case "plus": return (
      <svg width={s} height={s} viewBox="0 0 24 24" className={className}>
        <path {...stroke} d="M12 5v14M5 12h14"/>
      </svg>
    );
    case "search": return (
      <svg width={s} height={s} viewBox="0 0 24 24" className={className}>
        <circle cx="11" cy="11" r="7" {...stroke}/>
        <path {...stroke} d="M20 20l-3.5-3.5"/>
      </svg>
    );
    case "bell": return (
      <svg width={s} height={s} viewBox="0 0 24 24" className={className}>
        <path {...stroke} d="M6 18V11a6 6 0 1112 0v7M4 18h16M10 21h4"/>
      </svg>
    );
    case "note": return (
      <svg width={s} height={s} viewBox="0 0 24 24" className={className}>
        <path {...stroke} d="M5 4h11l4 4v12H5zM16 4v4h4M9 13h6M9 17h4"/>
      </svg>
    );
    default: return null;
  }
};

// ===== 朝のサマリー =====
function FlowMini({ orders }) {
  const counts = STAGES.map(s => orders.filter(o => o.stage === s).length);
  const total = counts.reduce((a, b) => a + b, 0) || 1;
  const icons = ["cart", "factory", "package", "truck", "check-circle"];
  const colors = ["#8A6CA3", "#C66F4D", "#D4A24C", "#7E9A75", "#6E8AA8"];
  return (
    <div style={{display:"flex", flexDirection:"column", gap:10}}>
      {STAGES.map((s, i) => (
        <div key={s} style={{display:"flex", alignItems:"center", gap:10}}>
          <div style={{
            width: 26, height: 26, borderRadius: 8,
            background: colors[i], color: "#fff",
            display: "grid", placeItems: "center", flexShrink: 0
          }}>
            <Icon name={icons[i]} size={13}/>
          </div>
          <div style={{flex: 1, minWidth: 0}}>
            <div style={{display:"flex", justifyContent:"space-between", marginBottom: 4, fontSize: 12}}>
              <span style={{fontWeight: 600}}>{s}</span>
              <span style={{color: "var(--ink-3)", fontVariantNumeric: "tabular-nums"}}>{counts[i]} 件</span>
            </div>
            <div style={{height: 6, background:"var(--line-2)", borderRadius:99, overflow:"hidden"}}>
              <div style={{
                height:"100%",
                width: `${(counts[i] / total) * 100}%`,
                background: colors[i],
                borderRadius: 99,
                transition: "width .3s"
              }}/>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function TasksMini({ tasks }) {
  const undone = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const pct = Math.round((done / total) * 100);
  const C = 2 * Math.PI * 32;
  return (
    <div>
      <div className="ring-wrap">
        <svg className="ring-svg" viewBox="0 0 84 84">
          <circle cx="42" cy="42" r="32" fill="none" stroke="#EBE0C5" strokeWidth="8"/>
          <circle cx="42" cy="42" r="32" fill="none" stroke="#C66F4D" strokeWidth="8"
            strokeDasharray={C} strokeDashoffset={C - (C * pct/100)}
            strokeLinecap="round"
            transform="rotate(-90 42 42)"/>
          <text x="42" y="44" textAnchor="middle" className="ring-text">{pct}%</text>
          <text x="42" y="58" textAnchor="middle" className="ring-sub-text">完了</text>
        </svg>
        <div>
          <div style={{fontFamily:"var(--font-display)", fontWeight:600, fontSize:15, marginBottom:4}}>
            残り {undone.length} タスク
          </div>
          <div style={{fontSize:12, color:"var(--ink-2)", lineHeight:1.6}}>
            高優先 {undone.filter(t => t.priority === "high").length} 件 ／ 中 {undone.filter(t => t.priority === "med").length} 件 ／ 低 {undone.filter(t => t.priority === "low").length} 件
          </div>
        </div>
      </div>
    </div>
  );
}

function SummaryView({ orders, inquiries, tasks, openOrder, openInquiry, setView }) {
  const stats = useMemo(() => {
    const newOrders = orders.filter(o => o.stage === "受注").length;
    const tightOrders = orders.filter(o => o.leadTimeTight && o.stage !== "完了").length;
    const newInq = inquiries.filter(i => i.status === "未対応").length;
    const angry = inquiries.filter(i => i.angerLevel >= 3 && i.status !== "完了").length;
    return { newOrders, tightOrders, newInq, angry };
  }, [orders, inquiries]);

  const priorities = useMemo(() => {
    const fromOrders = orders
      .filter(o => o.priority === "high" && o.stage !== "完了")
      .map(o => ({
        kind: "order",
        id: o.id,
        title: `${o.customer}`,
        subtitle: o.items.map(i => i.name).join(" / "),
        reason: o.needsCustomerQuestion
          ? `${o.customerQuestion}`
          : o.leadTimeTight
          ? `納期：${o.deliveryDate} — 製造を朝イチ着手`
          : `合計 ¥${o.totalYen.toLocaleString()} の業務用大口`,
        chips: o.flags,
        data: o,
      }));
    const fromInq = inquiries
      .filter(i => i.angerLevel >= 2 && i.status !== "完了")
      .map(i => ({
        kind: "inquiry",
        id: i.id,
        title: i.customer,
        subtitle: i.subject,
        reason: i.angerLevel === 3 ? "強いクレーム — 折返し電話を最優先" : i.preview.slice(0, 64) + "…",
        chips: i.tags,
        data: i,
        anger: i.angerLevel,
      }));
    const merged = [...fromInq, ...fromOrders].sort((a, b) => {
      const score = x => (x.anger || 0) * 10 + (x.data.leadTimeTight ? 5 : 0) + (x.data.needsCustomerQuestion ? 3 : 0);
      return score(b) - score(a);
    });
    return merged.slice(0, 6);
  }, [orders, inquiries]);

  return (
    <div>
      <div className="summary-hero">
        <div className="summary-hero-grid">
          <div>
            <span className="hero-eyebrow">
              <span className="hero-eyebrow-pulse" />
              AI が整理しました ・ 06:42 更新
            </span>
            <h1 className="hero-title">
              昨夜のあいだに <em>{stats.newOrders + stats.newInq}件</em> 入っています。<br/>
              優先度の高い <em>{stats.angry + stats.tightOrders}件</em> から取り掛かりましょう。
            </h1>
            <p className="hero-desc">
              23:00〜06:30 のあいだに届いた注文・問い合わせを、納期・怒り度・顧客タイプで自動仕分けしています。カードをクリックすると詳細が開きます。
            </p>
          </div>
          <div className="hero-stats">
            <div className="hero-stat">
              <div className="hero-stat-label">新規注文</div>
              <div className="hero-stat-num">{stats.newOrders}<span className="hero-stat-unit">件</span></div>
              <div className="hero-stat-foot">未処理 / 受注ステージ</div>
            </div>
            <div className="hero-stat urgent">
              <div className="hero-stat-label">短納期 ／ 本日着</div>
              <div className="hero-stat-num">{stats.tightOrders}<span className="hero-stat-unit">件</span></div>
              <div className="hero-stat-foot">朝イチで製造へ</div>
            </div>
            <div className="hero-stat">
              <div className="hero-stat-label">新着 問い合わせ</div>
              <div className="hero-stat-num">{stats.newInq}<span className="hero-stat-unit">件</span></div>
              <div className="hero-stat-foot">未対応のみ</div>
            </div>
            <div className="hero-stat urgent">
              <div className="hero-stat-label">クレーム ／ 怒り度 高</div>
              <div className="hero-stat-num">{stats.angry}<span className="hero-stat-unit">件</span></div>
              <div className="hero-stat-foot">折返し電話を推奨</div>
            </div>
          </div>
        </div>
      </div>

      <div className="priority-grid">
        <div className="card card-pad">
          <div className="section-head">
            <div>
              <h2 className="section-title">今朝、まずこれを</h2>
              <div className="section-sub">優先度トップ {priorities.length} 件 — 怒り度・短納期・大口を加味</div>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={() => setView("orders")}>
              すべて見る <Icon name="arrow-right" size={12}/>
            </button>
          </div>
          {priorities.map((p, idx) => (
            <div className="prio-item" key={p.id} onClick={() => p.kind === "order" ? openOrder(p.id) : openInquiry(p.id)} style={{cursor:"pointer"}}>
              <div className={`prio-rank r${Math.min(idx+1, 3)}`}>{idx+1}</div>
              <div className="prio-body">
                <div className="prio-title">
                  {p.title}
                  <span className="prio-id">{p.id}</span>
                  {p.kind === "inquiry" && p.anger === 3 && <span className="chip chip-rose"><Icon name="alert" size={10}/>怒り度 高</span>}
                  {p.kind === "order" && p.data.leadTimeTight && <span className="chip chip-rose"><Icon name="clock" size={10}/>短納期</span>}
                  {p.kind === "order" && p.data.needsCustomerQuestion && <span className="chip chip-amber"><Icon name="help" size={10}/>顧客確認</span>}
                  {p.kind === "inquiry" && p.data.needsSupplierContact && <span className="chip chip-plum">仕入先確認</span>}
                </div>
                <div className="prio-reason">{p.reason}</div>
              </div>
              <button className="btn btn-ghost btn-sm prio-action" onClick={(e) => { e.stopPropagation(); p.kind === "order" ? openOrder(p.id) : openInquiry(p.id); }}>
                開く
              </button>
            </div>
          ))}
        </div>

        <div style={{display:"flex", flexDirection:"column", gap:16}}>
          <div className="card card-pad">
            <div className="section-head">
              <h2 className="section-title">注文の流れ</h2>
              <button className="btn btn-ghost btn-sm" onClick={() => setView("orders")}>ボードへ <Icon name="arrow-right" size={12}/></button>
            </div>
            <FlowMini orders={orders} />
          </div>

          <div className="card card-pad">
            <div className="section-head">
              <h2 className="section-title">今日のタスク</h2>
              <button className="btn btn-ghost btn-sm" onClick={() => setView("tasks")}>すべて <Icon name="arrow-right" size={12}/></button>
            </div>
            <TasksMini tasks={tasks} />
          </div>
        </div>
      </div>
    </div>
  );
}

function OrderCard({ order, onAdvance, onBack, openOrder, stage }) {
  const cls = order.leadTimeTight ? "urgent" : (order.needsCustomerQuestion ? "warn" : "");
  const isFirst = stage === "受注";
  const isLast = stage === "完了";
  return (
    <div className={`ord-card ${cls}`} onClick={() => openOrder(order.id)}>
      <div className="ord-card-head">
        <span className="ord-id">{order.id}</span>
        <span className="ord-time">{order.receivedAt}</span>
      </div>
      <div className="ord-customer">{order.customer}</div>
      <div className="ord-items">
        {order.items.map(i => `${i.name}（${i.qty}）`).join(" / ")}
      </div>
      <div className="ord-foot">
        <span className="ord-yen">¥{order.totalYen.toLocaleString()}</span>
        <div className="ord-flags">
          {order.leadTimeTight && <span className="chip chip-rose"><span className="chip-dot"/>短納期</span>}
          {order.needsCustomerQuestion && <span className="chip chip-amber"><span className="chip-dot"/>顧客確認</span>}
          {order.customerType === "業務用" && <span className="chip chip-line">業務</span>}

      </div>
      {!isLast && (
        <div className="ord-quick" onClick={(e) => e.stopPropagation()}>

              <Icon name="arrow-left" size={11}/>
            </button>
          )}
          <button onClick={() => onAdvance(order.id)} title="次の工程へ進める">
            {STAGES[STAGES.indexOf(stage)+1]} へ進める <Icon name="arrow-right" size={11}/>
          </button>
        </div>
      )}
    </div>
  );
}

function InquiriesView({ inquiries, onChangeStatus, openInquiry }) {
  const [filter, setFilter] = useState("all");

  const filters = [
    { key: "all", label: "すべて" },
    { key: "未対応", label: "未対応" },
    { key: "anger3", label: "怒り度 高" },
    { key: "クレーム", label: "クレーム" },
    { key: "型番違い", label: "型番違い" },
    { key: "色違い", label: "色違い" },
    { key: "メーカー確認要", label: "メーカー確認要" },
    { key: "配送", label: "配送" },
    { key: "その他", label: "その他" },
    { key: "完了", label: "完了" },
  ];

  const countFor = (k) => {
    if (k === "all") return inquiries.length;
    if (k === "anger3") return inquiries.filter(i => i.angerLevel >= 3 && i.status !== "完了").length;
    if (k === "未対応" || k === "完了") return inquiries.filter(i => i.status === k).length;
    return inquiries.filter(i => i.type === k).length;
  };

  const visible = useMemo(() => {
    let list = inquiries;
    if (filter === "anger3") list = list.filter(i => i.angerLevel >= 3 && i.status !== "完了");
    else if (filter === "未対応" || filter === "完了") list = list.filter(i => i.status === filter);
    else if (filter !== "all") list = list.filter(i => i.type === filter);
    return [...list].sort((a, b) => {
      const sa = a.status === "完了" ? 100 : 0;
      const sb = b.status === "完了" ? 100 : 0;
      return (sa - sb) || (b.angerLevel - a.angerLevel);
    });
  }, [inquiries, filter]);

  return (
    <div>
      <div className="section-head" style={{marginBottom: 18}}>
        <div>
          <h2 className="section-title" style={{fontSize: 20}}>問い合わせ</h2>
          <div className="section-sub">怒り度・種別で自動仕分け — 各カードのボタンでステータス変更</div>
        </div>
      </div>

      <div className="inquiries-layout">
        <div className="card card-pad" style={{position:"sticky", top: 122, height:"fit-content"}}>
          <div style={{fontFamily:"var(--font-display)", fontWeight:600, fontSize:13, color:"var(--ink-3)", marginBottom: 10, letterSpacing:".04em"}}>
            絞り込み
          </div>
          <div className="filter-list">
            {filters.map(f => (
              <button key={f.key} className={`filter-item ${filter === f.key ? "active" : ""}`} onClick={() => setFilter(f.key)}>
                <span>{f.label}</span>
                <span className="filter-item-count">{countFor(f.key)}</span>
              </button>
            ))}
          </div>
        </div>

        <div className="inq-list">
          {visible.map(i => (
            <InquiryCard key={i.id} inq={i} onChangeStatus={onChangeStatus} openInquiry={openInquiry}/>
          ))}
          {visible.length === 0 && (
            <div className="card card-pad" style={{textAlign:"center", color:"var(--ink-3)"}}>
              該当する問い合わせはありません
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function TasksView({ tasks, onToggle }) {
  const groups = useMemo(() => {
    const byPriority = { high: [], med: [], low: [] };
    tasks.forEach(t => byPriority[t.priority].push(t));
    return byPriority;
  }, [tasks]);

  const done = tasks.filter(t => t.done).length;
  const pct = Math.round((done / tasks.length) * 100);
  const C = 2 * Math.PI * 56;

  const groupMeta = {
    high: { label: "高優先・朝イチで",  color: "var(--rose)" },
    med:  { label: "中優先・午前中に",  color: "var(--amber)" },
    low:  { label: "低優先・余裕があれば", color: "var(--sage)" },
  };

  return (
    <div>
      <div className="section-head" style={{marginBottom: 18}}>
        <div>
          <h2 className="section-title" style={{fontSize: 20}}>今日のタスク</h2>
          <div className="section-sub">AIが注文・問い合わせから自動生成 — チェックで完了</div>
        </div>
        <button className="btn btn-ghost btn-sm">
          <Icon name="plus" size={12}/> タスク追加
        </button>
      </div>

      <div className="tasks-grid">
        <div className="card card-pad">
          {["high", "med", "low"].map(p => (
            <div className="task-group" key={p}>
              <div className="task-group-head">
                <span className="task-group-dot" style={{background: groupMeta[p].color}}/>
                {groupMeta[p].label}
                <span style={{color:"var(--ink-3)", fontWeight:400, marginLeft: 4}}>
                  {groups[p].filter(t => !t.done).length} / {groups[p].length}
                </span>
              </div>
              {groups[p].map(t => (
                <div key={t.id} className={`task-row ${t.done ? "done" : ""}`} onClick={() => onToggle(t.id)}>
                  <div className="task-check">
                    <Icon name="check" size={14}/>
                  </div>
                  <div className="task-body">
                    <div className="task-title">{t.title}</div>
                    <div className="task-meta">
                      <span className={`task-due ${(!t.done && parseInt(t.dueBy) <= 9) ? "late" : ""}`}>
                        <Icon name="clock" size={10}/> {t.dueBy}
                      </span>
                      <span className="chip chip-line" style={{height:18, fontSize:10, padding:"0 7px"}}>{t.category}</span>
                      {t.linkedTo && <span style={{color:"var(--ink-3)"}}>→ {t.linkedTo}</span>}
                    </div>
                  </div>
                </div>
              ))}
              {groups[p].length === 0 && (
                <div style={{padding:"8px 12px", color:"var(--ink-3)", fontSize: 12}}>該当なし</div>
              )}
            </div>
          ))}
        </div>

        <div style={{display:"flex", flexDirection:"column", gap:16}}>
          <div className="card card-pad" style={{textAlign:"center", padding:"28px 22px"}}>
            <svg viewBox="0 0 140 140" style={{width: 160, height: 160}}>
              <circle cx="70" cy="70" r="56" fill="none" stroke="#EBE0C5" strokeWidth="11"/>
              <circle cx="70" cy="70" r="56" fill="none" stroke="#C66F4D" strokeWidth="11"
                strokeDasharray={C} strokeDashoffset={C - (C * pct/100)}
                strokeLinecap="round"
                transform="rotate(-90 70 70)"
                style={{transition:"stroke-dashoffset .4s"}}/>
              <text x="70" y="68" textAnchor="middle" style={{fontFamily:"var(--font-display)", fontWeight:700, fontSize:30, fill:"var(--ink)"}}>{pct}%</text>
              <text x="70" y="86" textAnchor="middle" style={{fontSize:11, fill:"var(--ink-3)"}}>{done} / {tasks.length} 完了</text>
            </svg>
            <div style={{fontFamily:"var(--font-display)", fontSize:14, color:"var(--ink-2)", marginTop:8}}>
              この調子で進めましょう
            </div>
          </div>

          <div className="card card-pad">
            <div className="section-head">
              <h2 className="section-title" style={{fontSize:15}}>カテゴリ別</h2>
            </div>
            <CategoryBars tasks={tasks}/>
          </div>
        </div>
      </div>
    </div>
  );
}

// ===== 詳細ドロワー =====
function OrderDetail({ order }) {
  const idx = STAGES.indexOf(order.stage);
  return (
    <div>
      <div className="kv-list">
        <div className="kv-row"><span className="kv-key">合計金額</span><span className="kv-val" style={{fontFamily:"var(--font-display)", fontWeight:700, fontSize:16}}>¥{order.totalYen.toLocaleString()}</span></div>
        <div className="kv-row"><span className="kv-key">納期</span>
          <span className="kv-val">
            {order.deliveryDate}
            {order.leadTimeTight && <span className="chip chip-rose" style={{marginLeft:8}}>短納期</span>}
          </span>
        </div>
        <div className="kv-row"><span className="kv-key">顧客タイプ</span><span className="kv-val">{order.customerType}</span></div>
      </div>

      <h3 style={{fontSize:13, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:".05em", margin:"4px 0 10px"}}>商品</h3>
      <div style={{display:"flex", flexDirection:"column", gap: 8, marginBottom: 22}}>
        {order.items.map((item, i) => (
          <div key={i} style={{display:"flex", justifyContent:"space-between", padding:"10px 14px", background:"var(--surface-2)", borderRadius: 10, border:"1px solid var(--line)"}}>
            <span style={{fontSize:13}}>{item.name}</span>
            <span style={{fontSize:13, color:"var(--ink-2)", fontVariantNumeric:"tabular-nums"}}>{item.qty}</span>
          </div>
        ))}
      </div>

      <h3 style={{fontSize:13, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:".05em", margin:"4px 0 10px"}}>進行状況</h3>
      <div className="timeline">
        {STAGES.map((s, i) => (
          <div key={s} className={`tl-step ${i < idx ? "done" : i === idx ? "current" : ""}`}>
            <div className="tl-dot"/>
            <div className="tl-label">{s}</div>
            <div className="tl-time">
              {i < idx ? "完了" : i === idx ? "現在進行中" : "—"}
            </div>
          </div>
        ))}
      </div>

      {(order.needsCustomerQuestion || order.notes.length > 0) && (
        <React.Fragment>
          <h3 style={{fontSize:13, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:".05em", margin:"4px 0 10px"}}>メモ・確認事項</h3>
          <div className="note-list">
            {order.needsCustomerQuestion && (
              <div className="note-item" style={{background:"#FBF1DA", borderColor:"#E8D8B5"}}>
                <div className="note-icon"><Icon name="help" size={11}/></div>
                <div><strong>顧客への質問が必要：</strong>{order.customerQuestion}</div>
              </div>
            )}
            {order.notes.map((n, i) => (
              <div key={i} className="note-item">
                <div className="note-icon" style={{background:"var(--sage-soft)", color:"var(--sage-ink)"}}><Icon name="note" size={11}/></div>
                <div>{n}</div>
              </div>
            ))}
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

function InquiryDetail({ inq }) {
  const faces = { 1: "🙂 落ち着き", 2: "😠 やや怒り", 3: "😡 高い怒り" };
  return (
    <div>
      <div className="kv-list">
        <div className="kv-row"><span className="kv-key">種別</span><span className="kv-val">{inq.type}</span></div>
        <div className="kv-row"><span className="kv-key">ステータス</span><span className="kv-val">{inq.status}</span></div>
        <div className="kv-row"><span className="kv-key">怒り度</span><span className="kv-val">{faces[inq.angerLevel]}</span></div>
        {inq.relatedOrder && <div className="kv-row"><span className="kv-key">関連注文</span><span className="kv-val">{inq.relatedOrder}</span></div>}
        {inq.needsSupplierContact && <div className="kv-row"><span className="kv-key">仕入先</span><span className="kv-val">{inq.supplier}</span></div>}
      </div>

      <h3 style={{fontSize:13, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:".05em", margin:"4px 0 10px"}}>お客様からの本文</h3>
      <div style={{padding:"14px 16px", background:"var(--surface-2)", border:"1px solid var(--line)", borderRadius: 12, fontSize: 13, color:"var(--ink-2)", lineHeight: 1.7, marginBottom: 22}}>
        {inq.preview}
      </div>

      <h3 style={{fontSize:13, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:".05em", margin:"4px 0 10px"}}>
        <Icon name="spark" size={12}/> AIからの推奨アクション
      </h3>
      <div className="note-item" style={{background:"#FBF1DA", borderColor:"#E8D8B5", marginBottom: 22}}>
        <div className="note-icon"><Icon name="spark" size={11}/></div>
        <div>{inq.suggestedReply}</div>
      </div>

      {inq.tags.length > 0 && (
        <div style={{display:"flex", gap:6, flexWrap:"wrap"}}>
          {inq.tags.map(t => <span key={t} className="chip chip-line">{t}</span>)}
        </div>
      )}
    </div>
  );
}

function Drawer({ open, onClose, kind, item, onAdvance, onBack, onChangeStatus }) {
  if (!open || !item) return null;
  return (
    <React.Fragment>
      <div className="drawer-overlay" onClick={onClose}/>
      <div className="drawer">
        <div className="drawer-head">
          <div>
            <div style={{fontSize: 11, color:"var(--ink-3)", letterSpacing:".04em", marginBottom: 4}}>
              {kind === "order" ? "注文" : "問い合わせ"} ・ {item.id}
            </div>
            <h2 style={{fontSize: 18, fontFamily:"var(--font-display)", fontWeight: 600}}>
              {kind === "order" ? item.customer : item.subject}
            </h2>
            {kind === "order" && <div style={{color:"var(--ink-2)", fontSize:13, marginTop:2}}>{item.customerType} / {item.receivedLabel} 受注 {item.receivedAt}</div>}
            {kind === "inquiry" && <div style={{color:"var(--ink-2)", fontSize:13, marginTop:2}}>{item.customer} ・ {item.customerType} ・ {item.receivedAt}</div>}
          </div>
          <button className="btn-icon" onClick={onClose}><Icon name="x" size={14}/></button>
        </div>

        <div className="drawer-body">
          {kind === "order" ? <OrderDetail order={item}/> : <InquiryDetail inq={item}/>}
        </div>

        <div className="drawer-foot">
          <button className="btn btn-ghost" onClick={onClose}>閉じる</button>
          {kind === "order" && item.stage !== "完了" && (
            <button className="btn btn-primary" onClick={() => { onAdvance(item.id); onClose(); }}>
              {STAGES[STAGES.indexOf(item.stage) + 1]} へ進める <Icon name="arrow-right" size={12}/>
            </button>
          )}
          {kind === "inquiry" && item.status === "未対応" && (
            <button className="btn btn-primary" onClick={() => { onChangeStatus(item.id, "対応中"); onClose(); }}>
              対応開始
            </button>
          )}
          {kind === "inquiry" && item.status === "対応中" && (
            <button className="btn btn-primary" onClick={() => { onChangeStatus(item.id, "完了"); onClose(); }}>
              完了にする
            </button>
          )}
        </div>
      </div>
    </React.Fragment>
  );
}

// ===== メインアプリ =====
function App() {
  const [view, setView] = useState("summary");
  const [orders, setOrders] = useState(initialOrders);
  const [inquiries, setInquiries] = useState(initialInquiries);
  const [tasks, setTasks] = useState(initialTasks);
  const [drawer, setDrawer] = useState({ open: false, kind: null, id: null });
  const [toast, setToast] = useState(null);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  const advanceOrder = (id) => {
    setOrders(prev => prev.map(o => {
      if (o.id !== id) return o;
      const i = STAGES.indexOf(o.stage);
      if (i >= STAGES.length - 1) return o;
      const next = STAGES[i + 1];
      showToast(`${o.id} を「${next}」へ進めました`);
      return { ...o, stage: next };
    }));
  };
  const backOrder = (id) => {
    setOrders(prev => prev.map(o => {
      if (o.id !== id) return o;
      const i = STAGES.indexOf(o.stage);
      if (i <= 0) return o;
      const next = STAGES[i - 1];
      showToast(`${o.id} を「${next}」へ戻しました`);
      return { ...o, stage: next };
    }));
  };
  const changeInquiryStatus = (id, status) => {
    setInquiries(prev => prev.map(i => {
      if (i.id !== id) return i;
      showToast(`${i.id} を「${status}」に変更しました`);
      return { ...i, status };
    }));
  };
  const toggleTask = (id) => {
    setTasks(prev => prev.map(t => {
      if (t.id !== id) return t;
      if (!t.done) showToast("タスクを完了にしました 🎉");
      return { ...t, done: !t.done };
    }));
  };
  const openOrder = (id) => setDrawer({ open: true, kind: "order", id });
  const openInquiry = (id) => setDrawer({ open: true, kind: "inquiry", id });
  const closeDrawer = () => setDrawer({ open: false, kind: null, id: null });

  const newOrderCount = orders.filter(o => o.stage === "受注").length;
  const unhandledInq = inquiries.filter(i => i.status !== "完了").length;
  const undoneTasks = tasks.filter(t => !t.done).length;

  const drawerItem = drawer.open
    ? (drawer.kind === "order" ? orders.find(o => o.id === drawer.id) : inquiries.find(i => i.id === drawer.id))
    : null;

  const today = new Date(2026, 5, 2);
  const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（火）`;

  const tabs = [
    { key: "summary",   label: "朝のサマリー", icon: "sun",     count: null },
    { key: "orders",    label: "注文の流れ",   icon: "package", count: newOrderCount, urgent: false },
    { key: "inquiries", label: "問い合わせ",   icon: "message", count: unhandledInq, urgent: inquiries.some(i => i.angerLevel >= 3 && i.status !== "完了") },
    { key: "tasks",     label: "今日のタスク", icon: "list",    count: undoneTasks },
  ];

  return (
    <div className="app">
      <header className="topbar">
        <div className="topbar-inner">
          <div className="topbar-row">
            <div className="brand">
              <div className="brand-mark">和</div>
              <div>
                <div className="brand-name">和牛屋ふくだ ・ 朝の整理</div>
                <div className="brand-sub">MORNING TRIAGE / EC OPERATIONS</div>
              </div>
            </div>
            <div className="greeting">
              <span className="greeting-hello">おはようございます、福田さん</span>
              <span className="greeting-date">{dateStr} 06:42</span>
            </div>
            <div style={{display:"flex", gap:10, alignItems:"center"}}>
              <button className="btn-icon" title="通知"><Icon name="bell" size={15}/></button>
              <div className="user-chip">
                <div className="user-avatar">福</div>
                <div>
                  <div className="user-chip-name">福田 修一</div>
                  <div className="user-chip-role">店主</div>
                </div>
              </div>
            </div>
          </div>
          <nav className="topnav">
            {tabs.map(t => (
              <button key={t.key} className={`tab ${view === t.key ? "active" : ""}`} onClick={() => setView(t.key)}>
                <Icon name={t.icon} size={15}/>
                {t.label}
                {t.count !== null && t.count > 0 && (
                  <span className={`tab-count ${t.urgent ? "urgent" : ""}`}>{t.count}</span>
                )}
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main className="main">
        {view === "summary"   && <SummaryView orders={orders} inquiries={inquiries} tasks={tasks} openOrder={openOrder} openInquiry={openInquiry} setView={setView}/>}
        {view === "orders"    && <OrdersView orders={orders} onAdvance={advanceOrder} onBack={backOrder} openOrder={openOrder}/>}
        {view === "inquiries" && <InquiriesView inquiries={inquiries} onChangeStatus={changeInquiryStatus} openInquiry={openInquiry}/>}
        {view === "tasks"     && <TasksView tasks={tasks} onToggle={toggleTask}/>}
      </main>

      <Drawer
        open={drawer.open}
        onClose={closeDrawer}
        kind={drawer.kind}
        item={drawerItem}
        onAdvance={advanceOrder}
        onBack={backOrder}
        onChangeStatus={changeInquiryStatus}
      />

      {toast && (
        <div className="toast">
          <Icon name="check-circle" size={14}/>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
